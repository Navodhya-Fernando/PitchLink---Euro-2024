{% extends base %}

{% block postamble %}
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    color: #e5e7eb;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  .bk-root {
    width: 100% !important;
    height: 100% !important;
  }

  .app-shell {
    width: 100vw;
    height: 100vh;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    padding: 0;
    box-sizing: border-box;
  }

  .app-viewport {
    flex: 1;
    display: flex;
    min-height: 0;
    min-width: 0;
    padding: 12px;
    box-sizing: border-box;
    background: radial-gradient(circle at top left, #0f172a 0%, #0a0a0a 35%);
  }

  .canvas-wrap {
    flex: 1;
    display: flex;
    min-width: 0;
    min-height: 0;
    border: 1px solid #1f2937;
    border-radius: 12px;
    overflow: hidden;
    background: #0b0f16;
  }

  /* Cleaner widgets */
  .bk-input, .bk-slider-title, .bk-input-group, .bk-btn {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
  }
</style>
{% endblock %}

{% block contents %}
<div class="app-shell">
  <div class="app-viewport">
    <div class="canvas-wrap">
      {{ embed(roots.app_root) }}
    </div>
  </div>
</div>
{% endblock %}
